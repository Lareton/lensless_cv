defaults:
  - model: leadmm20
  - datasets: digicam
  - dataloader: default
  - loss: reconstruction
  - metrics: image
  - writer: comet
  - _self_

seed: 42
device: auto

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-4
  betas: [0.9, 0.999]

trainer:
  epochs: 25
  amp: true
  grad_clip: null
  log_step: 50
  save_dir: saved
  resume_from: null
